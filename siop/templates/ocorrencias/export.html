<div class="content-grid">
  <section class="glass-card" style="grid-column: 1 / -1;">
    <div class="card-header">
      <div>
        <div class="card-title">Exportar ocorrências</div>
      </div>
    </div>

    <div class="form-grid" style="grid-template-columns: repeat(4, minmax(0, 1fr));">
      <div class="form-group-settings">
        <label>Natureza</label>
        <select id="export-natureza">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Tipo</label>
        <select id="export-tipo">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Área</label>
        <select id="export-area">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Local</label>
        <select id="export-local">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Pessoa</label>
        <select id="export-pessoa">
          <option value="">Todos</option>
          <option value="AGENTE_PUBLICO">Agente Público</option>
          <option value="COLABORADOR">Colaborador</option>
          <option value="LOCATARIO">Locatário</option>
          <option value="TERCEIRO">Terceiro</option>
          <option value="VISITANTE">Visitante</option>
          <option value="OUTROS">Outros</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Status</label>
        <select id="export-status">
          <option value="">Todos</option>
          <option value="aberto">Em aberto</option>
          <option value="finalizada">Finalizada</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Bombeiro Civil</label>
        <select id="export-bombeiro-civil">
          <option value="">Todos</option>
          <option value="sim">Sim</option>
          <option value="nao">Não</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>CFTV</label>
        <select id="export-cftv">
          <option value="">Todos</option>
          <option value="sim">Sim</option>
          <option value="nao">Não</option>
        </select>
      </div>

      <div class="form-group-settings">
        <label>Data/Hora inicial</label>
        <input type="datetime-local" id="export-data-inicio">
      </div>

      <div class="form-group-settings">
        <label>Data/Hora final</label>
        <input type="datetime-local" id="export-data-fim">
      </div>

      <div class="form-group-settings full-width export-actions-row">
        <div class="btn-group export-actions-group">
          <button class="btn btn-secondary" type="button" id="btn-export-filtrar">Filtrar</button>
          <button class="btn btn-danger" type="button" id="btn-export-limpar">Limpar</button>
          <div class="border-btn-export"><span>Extensão: </span>
          <button class="btn btn-secondary" type="button" id="btn-export-csv">CSV</button>
          <button class="btn btn-secondary" type="button" id="btn-export-xlsx">XLSX</button>
          <button class="btn btn-secondary" type="button" id="btn-export-pdf">PDF</button></div>
        </div>
      </div>

    </div>
  </section>
</div>

<div id="tab-export-list" data-current-page="1" data-current-sort="" data-current-dir="desc" style="margin-top: 16px;">
  <section class="glass-card">
    <div class="card-header">
      <div>
        <div class="card-title">Listagem para exportação</div>
        <div class="card-subtitle">Aplique os filtros acima e clique em Filtrar para exibir os resultados.</div>
      </div>
    </div>
  </section>
</div>
