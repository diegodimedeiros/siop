{% load tz %}
<div class="content-grid">
  <!-- COLUNA PRINCIPAL -->
  <section class="glass-card">
    <div class="card-header">
      <div>
        <div class="card-title">Editar acesso de terceiros <span id="edit-id"></span></div>
      </div>
      <div class="card-actions">
        <span class="status-badge pending" id="edit-status-badge">Em aberto</span>
      </div>
    </div>

    <!-- GRID DE CAMPOS -->
   
      <form id="edit-acesso-terceiros-form" method="post" enctype="multipart/form-data" action="">
        {% csrf_token %}     

        <div class="form-grid u-grid-2-equal">
          <div class="form-group-settings">
            <label for="data-edit">Data/Hora de entrada</label>
            <input type="datetime-local" id="data-edit" name="data" required>
          </div>

          <div class="form-group-settings">
            <label for="empresa-edit">Empresa</label>
            <input type="text" id="empresa-edit" name="empresa">
          </div>

          <div class="form-group-settings">
            <label for="nome-edit">Nome completo</label>
            <input type="text" id="nome-edit" name="nome" required>
          </div>

          <div class="form-group-settings">
            <label for="documento-edit">Documento</label>
            <input type="text" id="documento-edit" name="documento" required>
          </div>

          <div class="form-group-settings">
            <label for="p1-edit">P1</label>
            <select id="p1-edit" name="p1" required>
              <option value="">Selecione...</option>
            </select>
          </div>

          <div class="form-group-settings">
            <label for="saida-edit">Data/Hora de saída</label>
            <input type="datetime-local" id="saida-edit" name="saida">
          </div>

          <div class="form-group-settings full-width">
            <label for="descricao-edit">Descrição</label>
            <textarea id="descricao-edit" name="descricao" placeholder="Descrição aqui..."></textarea>
          </div>

          <div class="form-group-settings full-width">
            <label for="anexos-edit">Adicionar anexos</label>
            <input type="file" id="anexos-edit" name="anexos" multiple>
            <small class="u-form-helper">
              Você pode enviar novos anexos (os antigos serão mantidos).
            </small>
          </div>

          <div class="form-group-settings">
            <label for="placa-veiculo-edit">Placa do veículo</label>
            <input type="text" id="placa-veiculo-edit" name="placa_veiculo">
          </div>

        </div>
      </form>
  </section>

  <!-- COLUNA LATERAL -->
  <aside class="glass-card">
    <div class="card-header">
      <div>
        <div class="card-title">Ações</div>
      </div>
    </div>

    <div class="btn-group u-btn-group-column">
      <button class="btn btn-secondary" type="button" id="btn-salvar-edit">
        Salvar
      </button>

      <button class="btn btn-danger" type="button" id="btn-cancelar-edit">
        Cancelar
      </button>
    </div>

    <div class="u-mt-22">
      <div class="u-meta-stack">
        <div>
          <span class="u-text-muted">Criado em</span><br>
          <span id="edit-criado-em">—</span>
        </div>
        <div>
          <span class="u-text-muted">Criado por</span><br>
          <span id="edit-criado-por">—</span>
        </div>
        <div>
          <span class="u-text-muted">Modificado em</span><br>
          <span id="edit-modificado-em">—</span>
        </div>
        <div>
          <span class="u-text-muted">Modificado por</span><br>
          <span id="edit-modificado-por">—</span>
        </div>
      </div>
    </div>
  </aside>
</div>
