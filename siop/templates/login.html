{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SIOP{% endblock %}</title>
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon/favicon-16x16.png' %}">
    <link rel="shortcut icon" href="{% static 'img/favicon/favicon.ico' %}">
    <link rel="manifest" href="{% static 'img/favicon/site.webmanifest' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

</head>

<body>
    <!-- Animated Background -->
    <div class="background"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-page">
        <!-- Theme Toggle -->
        <button class="theme-toggle-float" id="theme-toggle" title="Toggle Light/Dark Mode">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" />
                <path d="M12 20v2" />
                <path d="M4.93 4.93l1.41 1.41" />
                <path d="M17.66 17.66l1.41 1.41" />
                <path d="M2 12h2" />
                <path d="M20 12h2" />
                <path d="M6.34 17.66l-1.41 1.41" />
                <path d="M19.07 4.93l-1.41 1.41" />
            </svg>
            <svg class="icon-moon icon-moon-hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
        </button>

        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">
                        <img src="{% static 'img/favicon/apple-touch-icon.png' %}" alt="SIOP logo">
                    </div>
                    <h1 class="login-title">Bem-vindo</h1>
                    <p class="login-subtitle">Entre para continuar no SIOP</p>
                </div>

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}

                    {% if form.errors %}
                    <div class="form-group">
                        <p class="u-login-error">Usuário ou senha inválidos.</p>
                    </div>
                    {% endif %}

                    <div class="form-group">
                        <label class="form-label" for="id_username">Usuário</label>
                        <input type="text" id="id_username" name="username" class="form-input" placeholder="Digite seu usuário" required autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="id_password">Senha</label>
                        <input type="password" id="id_password" name="password" class="form-input" placeholder="Digite sua senha"
                            required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Entrar
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <polyline points="12 5 19 12 12 19" />
                        </svg>
                    </button>
                </form>

                <p class="login-footer"></p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="site-footer">
            <p> <a href="" target="_blank" rel="nofollow"></a></p>
        </footer>
    </div>
    <script src="{% static 'js/shared/http.js' %}"></script>
    <script src="{% static 'js/shared/forms.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>

</html>
