{% load tz %}
<div class="content-grid">
  <!-- COLUNA PRINCIPAL -->
  <section class="glass-card">
    <div class="card-header">
      <div>
        <div class="card-title">Editar ocorrência <span id="edit-id"></span></div>
      </div>
      <div class="card-actions">
        <span class="status-badge pending" id="edit-status-badge">Em Aberto</span>
      </div>
    </div>

    <!-- GRID DE CAMPOS -->
   
      <form id="edit-ocorrencia-form" method="post" enctype="multipart/form-data" action="">
        {% csrf_token %}     

        <div class="form-grid u-grid-2-equal">
          <div class="form-group-settings">
            <label for="natureza-edit">Natureza</label>
            <input type="text" id="natureza-edit" name="natureza" disabled>
          </div>

          <div class="form-group-settings">
            <label for="tipo-edit">Tipo</label>
            <input type="text" id="tipo-edit" name="tipo" disabled>
          </div>

          <div class="form-group-settings">
            <label for="area-edit">Área</label>
            <input type="text" id="area-edit" name="area" disabled>
          </div>

          <div class="form-group-settings">
            <label for="local-edit">Local</label>
            <input type="text" id="local-edit" name="local" disabled>
          </div>

          <div class="form-group-settings">
            <label for="pessoa-edit">Pessoa</label>
            <input type="text" id="pessoa-edit" name="pessoa" disabled>
          </div>

          <div class="form-group-settings">
            <label for="data-edit">Data e Hora da Ocorrência</label>
            <input type="datetime-local" id="data-edit" name="data" required disabled>
          </div>

          <div class="form-group-settings full-width">
            <label for="descricao-edit">Descrição</label>
            <textarea id="descricao-edit" name="descricao" placeholder="Descrição aqui..." required></textarea>
          </div>

          <div class="form-group-settings full-width">
            <label for="anexos-edit">Adicionar anexos</label>
            <input type="file" id="anexos-edit" name="anexos" multiple>
            <small class="u-form-helper">
              Você pode enviar novos anexos (os antigos serão mantidos).
            </small>
          </div>

          <div class="form-group">
            <div>
              <label>
                <input type="checkbox" id="cftv-edit" name="cftv"> Possui imagens CFTV?
              </label>
            </div>
            <div>
              <label>
                <input type="checkbox" id="bombeiro_civil-edit" name="bombeiro_civil"> Acionou BC?
              </label>
            </div>
            <div>
              <label>
                <input type="checkbox" id="status-edit" name="status"> Ocorrência Finalizada?
              </label>
            </div>
          </div>
        </div>
      </form>
  </section>

  <!-- COLUNA LATERAL -->
  <aside class="glass-card">
    <div class="card-header">
      <div>
        <div class="card-title">Ações</div>
      </div>
    </div>

    <div class="btn-group u-btn-group-column">
      <button class="btn btn-secondary" type="button" id="btn-salvar-edit">
        Salvar
      </button>

      <button class="btn btn-danger" type="button" id="btn-cancelar-edit">
        Cancelar
      </button>
    </div>

    <div class="u-mt-22">
      <div class="u-meta-stack">
        <div>
          <span class="u-text-muted">Criado em</span><br>
          <span id="edit-criado-em">—</span>
        </div>
        <div>
          <span class="u-text-muted">Criado por</span><br>
          <span id="edit-criado-por">—</span>
        </div>
        <div>
          <span class="u-text-muted">Modificado em</span><br>
          <span id="edit-modificado-em">—</span>
        </div>
        <div>
          <span class="u-text-muted">Modificado por</span><br>
          <span id="edit-modificado-por">—</span>
        </div>
      </div>
    </div>
  </aside>
</div>
