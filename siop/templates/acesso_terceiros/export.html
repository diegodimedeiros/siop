<div class="content-grid">
  <section class="glass-card u-grid-span-full">
    <div class="card-header">
      <div>
        <div class="card-title">Exportar acessos de terceiros</div>
      </div>
    </div>

    <div class="form-grid u-grid-4-equal">
      <div class="form-group-settings">
        <label for="export-entrada-inicio">Entrada</label>
        <input type="datetime-local" id="export-entrada-inicio">
      </div>

      <div class="form-group-settings">
        <label for="export-saida-inicio">Saída</label>
        <input type="datetime-local" id="export-saida-inicio">
      </div>

      <div class="form-group-settings">
        <label for="export-empresa">Empresa</label>
        <input type="text" id="export-empresa" placeholder="Todos">
      </div>

      <div class="form-group-settings">
        <label for="export-nome">Nome</label>
        <input type="text" id="export-nome" placeholder="Todos">
      </div>

      <div class="form-group-settings">
        <label for="export-documento">Documento</label>
        <input type="text" id="export-documento" placeholder="Todos">
      </div>

      <div class="form-group-settings">
        <label for="export-p1">P1</label>
        <select id="export-p1">
          <option value="">Todos</option>
        </select>
      </div>

      

      <div class="form-group-settings">
        <label for="export-placa-veiculo">Placa do veículo</label>
        <input type="text" id="export-placa-veiculo" placeholder="Todos">
      </div>

      <div class="form-group-settings full-width export-actions-row">
        <div class="btn-group export-actions-group">
          <button class="btn btn-secondary" type="button" id="btn-export-filtrar">Filtrar</button>
          <button class="btn btn-danger" type="button" id="btn-export-limpar">Limpar</button>
          <div class="border-btn-export"><span>Extensão: </span>
          <button class="btn btn-secondary" type="button" id="btn-export-csv">CSV</button>
          <button class="btn btn-secondary" type="button" id="btn-export-xlsx">XLSX</button>
          <button class="btn btn-secondary" type="button" id="btn-export-pdf">PDF</button></div>
        </div>
      </div>

    </div>
  </section>
</div>

<div id="tab-export-list" data-current-page="1" data-current-sort="" data-current-dir="desc" class="u-mt-16">
  <section class="glass-card">
    <div class="card-header">
      <div>
        <div class="card-title">Listagem para exportação</div>
        <div class="card-subtitle">Aplique os filtros acima e clique em Filtrar para exibir os resultados.</div>
      </div>
    </div>
  </section>
</div>
